name: Pre-release Extension

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - prerelease
          - prepatch
          - preminor
          - premajor
        default: prerelease
      preid:
        description: 'Pre-release identifier'
        required: true
        type: choice
        options:
          - alpha
          - beta
          - rc
        default: alpha

permissions:
  contents: write

jobs:
  pre-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: version
        run: |
          npm version ${{ inputs.bump_type }} --preid=${{ inputs.preid }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vsix_name=bmad-codelens-${VERSION}.vsix" >> "$GITHUB_OUTPUT"

      - name: Test
        run: npm test

      - name: Compile and package
        run: npm run release

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: pre-release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD --tags

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: true
          body: |
            ## BMad Story CodeLens v${{ steps.version.outputs.version }} (Pre-release)

            > ⚠️ This is a pre-release version intended for testing. Use in production at your own risk.

            ### Install

            Download `${{ steps.version.outputs.vsix_name }}` and run:
            ```bash
            code --install-extension ${{ steps.version.outputs.vsix_name }}
            ```
          files: ${{ steps.version.outputs.vsix_name }}
          generate_release_notes: true
